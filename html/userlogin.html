<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Library Portal</title>
  <link rel="stylesheet" href="css/userlogin.css"/>
</head>

<body>
  <!-- Header Section -->
  <div class="header">
    <h1 id="portal">Mwigora Group Of Schools</h1>
  </div>

  <!-- Login / Signup Container -->
  <div class="login-container">
    <!-- Login Form -->
    <div class="form-content login-form active">
      <form id="login-form" class="form" method="POST" action="login.php">
        <h2>Login</h2>
        <input type="text" name="username" placeholder="Username" required/>
        <input type="password" name="password" placeholder="Password" required/>
        <button type="submit">Login</button>
        <p class="message">Not registered? <a href="#" id="to-signup">Create an account</a></p>
      </form>
    </div>

    <!-- Sign Up Form -->
    <div class="form-content signup-form">
      <form id="signup-form" class="form" method="POST" action="signup.php">
        <h2>Sign Up</h2>
        <input type="text" name="name" placeholder="Full Name" required/>
        <input type="password" name="password" placeholder="Password" required/>
        <input type="text" name="roll_number" placeholder="Roll Number" required/>
        <input type="date" name="dob" placeholder="Date of Birth" required/>
        <input type="email" name="email" placeholder="Email Address" required/>
        <button type="submit">Sign Up</button>
        <p class="message">Already registered? <a href="#" id="to-login">Log In</a></p>
      </form>
    </div>
  </div>

  <!-- Back Button -->
  <button id="back_button" onclick="location.href='index.php'">Back</button>
</body>
</html>
